<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Meesho Archery — Game</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#2a0b55" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600&family=Roboto:wght@400;500;700&family=Instrument+Serif&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/game.css" />
</head>
<body>
  <main class="screen game-screen" id="game-screen">
    <header class="game-header">
      <div class="app-header">
        <button class="icon-btn" id="back-btn" aria-label="Back">
          <img src="assets/images/icon-back.svg" alt="" />
        </button>

        <div class="logo">
          <img class="logo__glow" src="assets/images/logo-glow.svg" alt="" />
          <img class="logo__mark" src="assets/images/logo-text.webp" alt="Meesho Archery" width="700" height="700" />
        </div>

        <button class="icon-btn" id="share-btn" aria-label="Share">
          <img src="assets/images/icon-share.svg" alt="" />
        </button>
      </div>

      <div class="game-stats">
        <div class="stat">
          <span class="stat__label">Score:</span>
          <span class="stat__value" id="score-value">00</span>
        </div>
        <div class="stat">
          <span class="stat__label">Timer:</span>
          <span class="stat__value" id="timer-value">60s</span>
        </div>
      </div>
    </header>

    <div class="game-body" id="game-body">
      <div class="conveyor" id="conveyor">
        <div class="conveyor__track" id="conveyor-track"></div>
      </div>

      <div class="arena" id="arena">
        <div class="arena__target"></div>
      </div>

      <div class="quiver-area">
        <div class="bow-wrap" id="bow-wrap">
          <img class="bow-wrap__img" src="assets/images/bow.webp" alt="Bow" width="559" height="151" />
          <div class="bow-string" id="bow-string-left"></div>
          <div class="bow-string" id="bow-string-right"></div>
          <button class="nocked-arrow" id="nocked-arrow" aria-label="Pull and release to shoot">
            <img src="assets/images/arrow.webp" alt="" draggable="false" width="143" height="958" />
          </button>
          <div class="draw-hint" id="draw-hint" aria-hidden="true" hidden>
            <div class="draw-hint__bubble">Pull down &amp; release to shoot!</div>
            <span class="draw-hint__finger"></span>
          </div>
        </div>
        <div class="quiver" id="quiver"></div>
      </div>

      <div class="flight-layer" id="flight-layer"></div>

      <div class="game-over-overlay" id="game-over-overlay" hidden>
        <h2 class="sr-only" id="game-over-title"></h2>

        <div class="game-over-content">
          <div class="game-over-sticker" id="game-over-sticker">
            <img id="game-over-sticker-img" src="" alt="" />
          </div>
          <p class="game-over-score">Your Score : <span id="final-score">0</span></p>
          <p class="game-over-emoji" id="game-over-emoji">😔</p>
        </div>

        <div class="game-over-actions">
          <button class="btn btn--primary" id="play-again-btn" type="button">Play Again</button>
          <button class="btn btn--primary" id="leaderboard-btn" type="button">Leaderboard</button>
          <button class="link-btn" id="rewards-btn" type="button">Rewards</button>
        </div>
      </div>

      <div class="toast" id="toast" hidden></div>
    </div>
  </main>

  <script type="module" src="js/game.js"></script>
</body>
</html>
