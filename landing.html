<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Meesho Archery</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#2a0b55" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/landing.css" />
</head>
<body>
  <main class="screen landing-screen" id="landing-screen">
    <header class="app-header">
      <button class="icon-btn" id="back-btn" aria-label="Back">
        <img src="assets/images/icon-back.svg" alt="" />
      </button>

      <div class="logo">
        <img class="logo__mark" src="assets/images/logo-mark-new.webp" alt="Meesho Archery" width="912" height="636" />
      </div>

      <button class="icon-btn" id="share-btn" aria-label="Share">
        <img src="assets/images/icon-share.svg" alt="" />
      </button>
    </header>

    <div class="landing-stage">
      <div class="hero">
        <img class="hero__image" src="assets/images/hero.webp" alt="Archery target with a golden arrow" width="572" height="1024" />
        <div class="hero__fade-top"></div>
      </div>

      <div class="landing-actions">
        <div class="play-gate">
          <div class="plays-chip" id="landing-plays-chip">
            <span class="plays-chip__text" id="landing-plays-chip-text"></span>
          </div>
          <button class="btn btn--primary" id="start-game-btn">Start Game</button>
        </div>
        <button class="btn btn--secondary" id="leaderboard-btn">Leaderboard</button>
        <button class="link-btn" id="rewards-btn">Rewards</button>
      </div>
    </div>
  </main>

  <script type="module" src="js/main.js?v=3"></script>
</body>
</html>
